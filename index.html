function hexToBytes(h){const b=new Uint8Array(h.length/2);for(let i=0;i<h.length;i+=2)b[i/2]=parseInt(h.substr(i,2),16);return b}
async function decrypt(){
const pw=document.getElementById("pw").value;
if(!pw)return;
try{
const enc=new TextEncoder(),km=await crypto.subtle.importKey("raw",enc.encode(pw),"PBKDF2",false,["deriveKey"]);
const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:hexToBytes(salt),iterations:100000,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["decrypt"]);
const raw=Uint8Array.from(atob(ct),c=>c.charCodeAt(0));
const plain=await crypto.subtle.decrypt({name:"AES-GCM",iv:hexToBytes(iv)},key,raw);
document.open();document.write(new TextDecoder().decode(plain));document.close();
}catch(e){document.getElementById("err").style.display="block"}
}
document.getElementById("pw").addEventListener("keydown",e=>{if(e.key==="Enter")decrypt()});
